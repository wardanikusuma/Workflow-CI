name: CI Workflow

on:
  push:
    branches: ["main"]

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Set up job
      run: echo "Starting Model Retraining Workflow CI..."

    - name: Run actions/checkout@v3
      uses: actions/checkout@v3

    - name: Set up Python 3.12.7
      uses: actions/setup-python@v4
      with:
        python-version: "3.12.7"

    - name: Check Env
      run: |
        python --version
        pip --version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install mlflow pandas scikit-learn

    - name: Run mlflow project
      run: |
        # Menggunakan titik (.) agar membaca file MLproject di root directory secara valid
        mlflow run . --env-manager=local

    - name: Get latest MLflow run_id
      run: |
        # Mencetak bukti run_id baru hasil retraining lokal di GitHub Actions
        RUN_ID=$(ls -td mlruns/0/*/ | grep -Eo '[0-9a-f]{32}' | head -n 1)
        echo "Latest run_id: $RUN_ID"